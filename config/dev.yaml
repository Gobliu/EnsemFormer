# -----------------------------------------------------------------------
# EnsemFormer / CycloFormer  —  dev.yaml  (thumb dataset, coding only)
# -----------------------------------------------------------------------
# Use with:  python scripts/main_train.py --config config/dev.yaml
# data/thumb.csv + data/pdbs/ hold 10 molecules for fast dev iteration.
# default.yaml is untouched and still points to the full dataset.
# -----------------------------------------------------------------------

# Paths
paths:
  csv_path: data/thumb.csv
  traj_dir: data/
  log_dir: experiments/
  load_checkpoint: null
  cache_file: null                 # REQUIRED: e.g. data/thumbnail_traj_water_noH.pt (from preprocess_trajectories.py)

# Data
data:
  target_col: PAMPA
  env: [water]
  rep_frame_only: false
  n_conformers: 5
  split: 0                         # run: python scripts/generate_splits.py --csv data/thumb.csv
  batch_size: 4
  num_workers: 0
  seed: 42

# GNN Encoder (per-conformer backbone)
gnn:
  type: egnn
  mode: ensemble
  use_bond_type: false

  egnn:
    hidden_nf: 128
    n_layers: 4
    attention: false
    normalize: false

  cpmp:
    d_model: 128
    N: 4
    h: 8
    N_dense: 2
    lambda_attention: 0.3
    lambda_distance: 0.3
    dropout: 0.1
    distance_matrix_kernel: softmax
    one_hot_formal_charge: true

  se3t:
    num_layers: 4
    num_channels: 32
    num_degrees: 4
    num_heads: 8
    channels_div: 2
    norm: true
    use_layer_norm: true
    low_memory: true

# Conformer Transformer (over conformer tokens)
conformer_transformer:
  d_model: 128
  n_heads: 4
  n_layers: 2
  d_ff: 256
  dropout: 0.1
  pooling: cls
  max_conformers: 16

# MLP Head
head:
  d_hidden: 64
  dropout: 0.1

# Training
training:
  epochs: 5
  learning_rate: 0.001
  weight_decay: 0.01
  amp: false
  accumulate_grad_batches: 1
  gradient_clip: null
  eval_interval: 1
  patience: 20
  delta: 0.0001
  silent: false
  version: null
