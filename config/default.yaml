# -----------------------------------------------------------------------
# EnsemFormer / CycloFormer  —  default.yaml
# -----------------------------------------------------------------------

# Paths
paths:
  data_dir: data/                  # directory containing the CSV file
  csv_file: CycPeptMPDB-4D.csv    # relative to data_dir
  traj_dir: /home/liuw/GitHub/Data/CycPeptMPDB_4D   # root of CycPeptMPDB_4D (cycpeptmpdb mode)
  pdb_dir: null                    # set to pdb subdirectory name if conformer_source=pdb
  log_dir: experiments/            # base directory for run outputs
  load_checkpoint: null            # path to .pth file to resume from
  cache_file: null                 # REQUIRED: e.g. data/cache_traj_water_noH.pt (from traj_preprocess.py)

# Data
data:
  conformer_source: cycpeptmpdb    # 'smiles' | 'pdb' | 'cycpeptmpdb'
  target_col: PAMPA                # column name in CSV to use as regression target
  env: [water, hexane]                     # environment(s) to use: [water], [hexane], [water, hexane]
  rep_frame_only: false            # true = standalone (1 conformer); false = ensemble (n_conformers frames)
  n_conformers: 10                 # frames sampled per molecule in ensemble mode
  ff: mmff                         # force field for smiles mode
  split: null                      # null = random 80/10/10; set to int for pre-defined split column
  batch_size: 32
  num_workers: 4
  seed: 42

# GNN Encoder (per-conformer backbone)
gnn:
  type: egnn                       # 'egnn' | 'cpmp' | 'se3t'
  mode: ensemble                   # 'ensemble' (conformer transformer) | 'standalone' (direct pool)
  use_bond_type: false             # pass bond type as edge features to GNN encoder
  # --- EGNN-specific ---
  hidden_nf: 128                   # GNN hidden / output dimension (d_gnn)
  n_layers: 4
  attention: false
  normalize: false
  # --- CPMP-specific (ignored when type=egnn) ---
  d_model: 128                     # CPMP hidden dimension (also d_gnn)
  N: 4                             # number of CPMP encoder layers
  h: 8                             # attention heads
  N_dense: 2
  lambda_attention: 0.3
  lambda_distance: 0.3
  dropout_cpmp: 0.1
  distance_matrix_kernel: softmax
  one_hot_formal_charge: true      # CPMP only: expand scalar charge -> 3-dim one-hot at forward time
  # --- SE3T-specific (ignored when type != se3t) ---
  se3t_num_layers: 4               # SE3Transformer attention layers
  num_channels: 32                 # channels per feature type
  num_degrees: 4                   # number of feature types (degrees 0..num_degrees-1)
  se3t_num_heads: 8                # attention heads
  channels_div: 2                  # channel divisor for value projection
  se3t_norm: true                  # NormSE3 after each attention block
  se3t_use_layer_norm: true        # layer norm inside radial MLPs
  se3t_low_memory: true            # trade speed for lower memory

# Conformer Transformer (over conformer tokens)
conformer_transformer:
  d_model: 128                     # must equal gnn.hidden_nf (or gnn.d_model)
  n_heads: 4
  n_layers: 2
  d_ff: 256                        # FFN hidden dim (typically 2x or 4x d_model)
  dropout: 0.1
  pooling: cls                     # 'cls' | 'mean'
  max_conformers: 16               # positional encoding table size

# MLP Head
head:
  d_hidden: 64                     # hidden dim of 2-layer MLP head
  dropout: 0.1

# Training
training:
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.01
  amp: false                       # mixed precision training
  accumulate_grad_batches: 1
  gradient_clip: null              # max gradient norm (null to disable)
  eval_interval: 1                 # validate every N epochs
  patience: 20                     # early stopping patience
  delta: 0.0001                    # early stopping min improvement
  silent: false                    # suppress tqdm progress bars
  version: null                    # run version; auto-incremented if null
